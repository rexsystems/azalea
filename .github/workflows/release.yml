name: Release

# Builds installable desktop apps and publishes GitHub Releases for downloads.
# Runs only on master. The dev branch is intentionally excluded.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Azalea (Windows installer)
        run: npm run build

      - name: Read version
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Azalea v${{ steps.meta.outputs.version }} (build ${{ github.run_number }})
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
